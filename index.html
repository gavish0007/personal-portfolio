<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gavish Nagar — At the Desk</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="desk.css">
<script type="importmap">
{ "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
} }
</script>
</head>
<body class="desk-body">

<div id="loader" class="loader">
  <div class="loader-inner">
    <span class="loader-glyph">🌇</span>
    <div class="loader-label">Waiting for the sun to set…</div>
    <div class="loader-bar"><div class="loader-fill" id="loaderFill"></div></div>
  </div>
</div>

<canvas id="scene"></canvas>

<div class="letterbox letterbox-top"></div>
<div class="letterbox letterbox-bottom"></div>
<div class="cut-flash" id="cutFlash"></div>

<div class="hud">
  <div class="hud-brand">Gavish<span class="dot">.</span>Nagar</div>
  <div class="hud-hint" id="hudHint">Look around the desk — click what catches your eye</div>
  <a class="hud-fallback" href="hub-2d-backup.html">Simple view</a>
</div>

<button class="reset-btn" id="resetBtn" title="Back to the full view">
  <span>↺</span>
</button>

<div id="promptBar" class="prompt-bar"></div>

<div id="hologram" class="hologram">
  <div class="holo-corner tl"></div><div class="holo-corner tr"></div>
  <div class="holo-corner bl"></div><div class="holo-corner br"></div>
  <button class="holo-close" id="holoClose">✕</button>
  <div class="holo-body" id="holoBody"></div>
</div>

<noscript>
  <div style="position:fixed; inset:0; background:#12333A; color:#F3E9D8; display:flex; align-items:center; justify-content:center; text-align:center; padding:2rem; font-family:sans-serif; z-index:200;">
    This page needs JavaScript for the 3D scene. <a href="hub-2d-backup.html" style="color:#E8A560; margin-left:6px;">View the simple version instead →</a>
  </div>
</noscript>

<script type="module" src="desk.js"></script>
</body>
</html>
